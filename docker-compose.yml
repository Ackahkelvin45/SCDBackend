services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scd_db
      POSTGRES_USER: scd_user
      POSTGRES_PASSWORD: scd_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scd_user -d scd_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8025:8025"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
